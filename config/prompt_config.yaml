voice:
  identity:
    - expert
    - inspirational
    - collaborative
    - approachable
    - human

tone:
  attributes:
    - confident_but_humble
    - purpose_driven
    - friendly_guide
    - clear_and_accessible
    - upbeat
    - community_centric

writing_style:
  language: American English
  brand_name: KickstartAI
  voice: active

  constraints:
    no_em_dashes: true
    no_buzzwords: true
    no_ai_phrasing: true
    avoid_redundancy: true

  structure:
    max_paragraph_length_lines: 5
    sentences_preferred: short

  numbers:
    spell_one_to_nine: true
    numerals_10_plus: true
    percent_symbol: true
    thousand_separator: comma

  punctuation:
    oxford_comma: true
    quotes: double

output:
  linkedin_posts: 3
  variants:
    - strategic
    - reflective
    - opinionated
  end_with_question: true
